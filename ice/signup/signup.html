<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: rgb(120,96,64);
    display:flex;
    justify-content:center;
    align-items:center;
    position:absolute;
    width:100%;
    height:100%;
    font-family: Georgia, serif;
}

#formContainer{
    width:450px;
    background:white;
    border-radius:30px;
    overflow:hidden;
    border:10px solid #3f3225;
    box-shadow: 0 12px 30px rgba(0,0,0,.25);
}


.header{
    position:relative;
}

.header img{
    width:100%;
    height:160px;
    object-fit:cover;
    object-position: center 20%;
}

.headerText{
    position:absolute;
    top:70%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    text-shadow: 5px 2px 3px #000000;
}

.headerText h1{
    font-size:35px;
    font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif
}

.headerText h2{
    font-size:20px;
    padding: 10px;
    font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
}

#closeBtn{
    position:absolute;
    top:8px;
    left:8px;
    background:white;
    border:none;
    width: 24px;
    height: 24px;
    padding:5px 8px;
    cursor:pointer;
}


form{
    padding:15px;
    display:grid;
    grid-template-columns:200px 1fr;
    gap:20px;
}

form h3{
    grid-column:1/3;
    text-align:center;
    margin-bottom:5px;
}


section{
    grid-column:1/3;
    display:flex;
    justify-content: center;
    gap:6px;
}



.scriptures{
    display:grid;
    grid-template-columns:repeat(5,1fr);
}

.scriptures img{
    width:100%;
}


    



</style> 




</head>


<body>
    
    <div id="formContainer">
<div class="header">
<button type="button" id="closeBtn">X</button>

<img src="images/jesus_feeds_5000.jpeg" alt="Christ">

<div class="headerText">
<h1>Daily Feed</h1>
<h2>Scripture a Day</h2>
</div>

</div>
       
       
        <form id="myForm">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div class="scriptures">
<img src="images/old_testament.webp">
<img src="images/new_testament.webp">
<img src="images/book_of_mormon.webp">
<img src="images/doctrine_and_covenants.webp">
<img src="images/pearl_of_great_price.webp">
</div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
