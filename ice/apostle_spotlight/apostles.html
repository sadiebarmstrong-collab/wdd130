<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apostles Spotlights</title>

<style>

#card {
    border: 10px solid black;
    border-radius: 5%;
    background-image: url("images/christus.webp");
    width: auto;
    background-position: -200px;
}

#Twelve {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 800px;
    margin: auto;
}

img {
    border-radius: 50%;
    border: 10px solid white;
    margin: 10px;
}

body {
    font-family: Arial;
    color: #E8ECED;
    text-align: center;
}

.Prophet {
    height: 230px;
    width: 230px;
    margin: 0px 20px 0px 20px;
}

.Councilor {
    width: 200px;
    height: 200px;
}

.Apostle {
    width: 150px;
    height: 150px;
}

</style>
</head>

<body>

<div id="card">

<h1>First Presidency</h1>

<div id="First">
    <img class="Councilor" src="images/eyring.webp" alt="Eyring">
    <img class="Prophet" src="images/oaks.webp" alt="Oaks">
    <img class="Councilor" src="images/christofferson.webp" alt="Christofferson">
</div>

<h2>Quorum of the Twelve Apostles</h2>

<div id="Twelve">

<img class="Apostle" src="images/anderson.webp" alt="Anderson">
<img class="Apostle" src="images/bednar.webp" alt="Bednar">
<img class="Apostle" src="images/causse.webp" alt="Causse">
<img class="Apostle" src="images/cook.webp" alt="Cook">
<img class="Apostle" src="images/gong.webp" alt="Gong">
<img class="Apostle" src="images/holland.webp" alt="Holland">
<img class="Apostle" src="images/kearon.webp" alt="Kearon">
<img class="Apostle" src="images/rasband.webp" alt="Rasband">
<img class="Apostle" src="images/renlund.webp" alt="Renlund">
<img class="Apostle" src="images/soares.webp" alt="Soares">
<img class="Apostle" src="images/stevenson.webp" alt="Stevenson">
<img class="Apostle" src="images/uchtdorf.webp" alt="Uchtdorf">

</div>

</div>

</body>
</html>
